<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Dla Ciebie, Ola</title>
<style>
body {
    margin: 0;
    padding: 0;
    background: #0f0f0f;
    font-family: Arial, sans-serif;
    overflow: hidden;
}
.container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    max-width: 800px;
    z-index: 2;
}
.text-title {
    color: #ff4d4d;
    font-size: 48px;
    margin-bottom: 10px;
}
.text-body {
    color: #f1f1f1;
    font-size: 36px;
    line-height: 1.5;
    white-space: pre-line;
}
.arrow {
    font-size: 48px;
    cursor: pointer;
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
}
.heart {
    position: absolute;
    font-size: 30px;
    animation: floatUp 2s ease-out forwards;
}
@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-250px); opacity: 0; }
}

#slideshow {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    background-size: cover;
    background-position: center;
    z-index: 1;
}
</style>
</head>
<body>

<div class="container" id="display"></div>
<div class="arrow" onclick="nextStep()">➡️</div>
<div id="slideshow"></div>

<audio id="audio" loop>
    <source src="muzyka.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");
let audioStarted = false;

function startAudio(){
    if(!audioStarted){
        audio.volume = 1;
        audio.play().catch(e => console.log("audio error:", e));
        audioStarted = true;
    }
}

const startDate = new Date("2024-11-29");

function calculateTotal() {
    const now = new Date();
    const diff = now - startDate;
    const days = Math.floor(diff / (1000*60*60*24));
    const months = (days / 30.4375).toFixed(1);
    const years = (months / 12).toFixed(2);
    return {days, months, years};
}

const steps = [
    {body: () => `Jesteśmy razem ${calculateTotal().years} lat`},
    {body: () => `Jesteśmy razem ${calculateTotal().months} miesięcy`},
    {body: () => `Jesteśmy razem ${calculateTotal().days} dni`},

    {title:"Pierwsza wiadomość 17.07.2024", body:"o treści '.'"},
    {title:"Wejście w związek 29.11.2024", body:"A więc Aleksandro...\n(reszta tekstu)"},
    {title:"Pierwsze spotkanie 21.06.2025", body:""},

    {body:"Wiem, że Cię skrzywdziłem."},
    {body:"Okłamywałem Cię.\nObiecywałem rzeczy, których nie zrobiłem."},
    {body:"A mimo to byłaś przy mnie."},
    {title:"Jesteś dla mnie naprawdę ważna.", body:"Najważniejszą osobą w moim życiu."},
    {body:"Chcę się zmienić działaniem."},
    {body:"Nie skreślaj mnie proszę."}
];

let i = 0;
const display = document.getElementById("display");

function showStep(){
    display.innerHTML = "";

    if(steps[i].title){
        const t = document.createElement("div");
        t.className = "text-title";
        t.innerText = steps[i].title;
        display.appendChild(t);
    }

    const b = document.createElement("div");
    b.className = "text-body";
    b.innerText = typeof steps[i].body === "function"
        ? steps[i].body()
        : steps[i].body;

    display.appendChild(b);
}

function nextStep(){
    startAudio();

    i++;
    if(i < steps.length){
        showStep();
    } else {
        startSlideshow();
        document.querySelector(".arrow").style.display = "none";
        display.style.display = "none";
    }
}

function startSlideshow(){
    const slide = document.getElementById("slideshow");
    slide.style.display = "block";

    let img = 1;

    slide.style.backgroundImage = `url('image1.png')`;

    setInterval(() => {
        img++;
        if(img > 39) img = 1;
        slide.style.backgroundImage = `url('image${img}.png')`;
    }, 5000);
}

showStep();
</script>

</body>
</html>
