<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Dla Ciebie, Ola</title>
<style>
body {
    margin: 0;
    padding: 0;
    background: #0f0f0f;
    font-family: Arial, sans-serif;
    overflow: hidden;
}
.container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    max-width: 800px;
    z-index: 1;
}
.text-title {
    color: #ff4d4d;
    font-size: 48px;
    margin-bottom: 10px;
}
.text-body {
    color: #f1f1f1;
    font-size: 36px;
    line-height: 1.5;
}
.arrow {
    font-size: 48px;
    cursor: pointer;
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
}
.heart {
    position: absolute;
    font-size: 30px;
    animation: floatUp 2s ease-out forwards;
    pointer-events: none;
}
@keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-250px) scale(1.5); opacity: 0; }
}
.section { display: none; }
.section.show { display: block; }
#slideshow {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    background-size: cover;
    background-position: center;
    z-index: 0;
    animation: slowZoom 10s infinite alternate;
}
@keyframes slowZoom {
    0% { transform: scale(1); }
    100% { transform: scale(1.1); }
}
</style>
</head>
<body>

<div class="container" id="display-container">
    <!-- Tutaj będzie dynamicznie wyświetlany tekst -->
</div>

<div class="arrow" onclick="nextStep()">➡️</div>

<div id="slideshow"></div>

<audio id="audio" src="muzyka.mp3.mp3" loop></audio>

<script>
const audio = document.getElementById("audio");
let audioStarted = false;

function startAudio(){ if(!audioStarted){ audio.play().catch(()=>{}); audioStarted=true; } }

const startDate = new Date("2024-11-29T00:00:00");
function calculateTotal() {
    const now = new Date();
    const diffMs = now - startDate;
    const diffDays = Math.floor(diffMs / (1000*60*60*24));
    const diffMonths = +(diffDays / 30.4375).toFixed(1);
    const diffYears = +(diffMonths / 12).toFixed(2);
    return {years: diffYears, months: diffMonths, days: diffDays};
}

// wszystkie sekcje w kolejności
const steps = [
    // Licznik
    {title: "", body: () => {
        const t = calculateTotal();
        return `Jesteśmy razem ${t.years} lat`;
    }},
    {title: "", body: () => {
        const t = calculateTotal();
        return `Jesteśmy razem ${t.months} miesięcy`;
    }},
    {title: "", body: () => {
        const t = calculateTotal();
        return `Jesteśmy razem ${t.days} dni`;
    }},
    // Wydarzenia
    {title:"Pierwsza wiadomość 17.07.2024", body: "o treści '.'"},
    {title:"Wejście w związek 29.11.2024", body:"A więc Aleksandro. Jak ostatnio sprawdzaliśmy nasza znajomość zaczęła rozwijać się w lipcu kiedy byliśmy dla siebie zwykłymi nnkami chcącymi się po prostu poznać w kierunku koleżeńskim/przyjacielskim...\nZ biegiem czasu jedno i drugie zaczęło dostrzegać efekt zakochania i możliwego związku...\nA po wczorajszej rozmowie niekoniecznie wiedziałem jakby Ci powiedzieć, że nie chce żebyś tylko w Fivemie, a również poza grą nazywać Ciebie swoją babą ponieważ po prostu Cię kocham."},
    {title:"Pierwsze spotkanie 21.06.2025", body:""},
    // Sekcje przeprosin
    {title:"", body:"Wiem, że Cię skrzywdziłem."},
    {title:"", body:"Okłamywałem Cię.\nObiecywałem rzeczy, których nie zrobiłem.\nMiałem wziąć się za pracę, prawko i siebie — ale tego nie zrobiłem.\nByłem zazdrosny i dokładałem Ci problemów."},
    {title:"", body:"A mimo to byłaś przy mnie.\nWspierałaś mnie i dawałaś mi więcej, niż na to zasługiwałem.\nI wiem, że to przeze mnie zaczęłaś się przy mnie źle czuć."},
    {title:"Jesteś dla mnie naprawdę ważna.", body:"Najważniejszą i najwspanialszą osobą w moim życiu."},
    {title:"", body:"Nie chcę już rzucać pustych obietnic.\nChcę się zmienić i pokazać to działaniem."},
    {title:"", body:"Nie oczekuję, że od razu będzie zajebiście i mi wybaczysz.\nPo prostu chciałem, żebyś to wiedziała.\nI żebyś jeszcze mnie nie skreśliła."}
];

let currentStep = 0;
const display = document.getElementById("display-container");

function spawnHearts() {
    for(let i=0;i<20;i++){
        const heart = document.createElement("div");
        heart.className="heart";
        heart.innerText="❤️";
        heart.style.left=Math.random()*window.innerWidth+"px";
        heart.style.top=Math.random()*window.innerHeight+"px";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),2500);
    }
}

function showStep() {
    display.innerHTML = "";
    const stepData = steps[currentStep];
    if(stepData.title) {
        const t = document.createElement("div");
        t.className="text-title";
        t.innerText = stepData.title;
        display.appendChild(t);
    }
    const b = document.createElement("div");
    b.className="text-body";
    b.innerText = typeof stepData.body === "function" ? stepData.body() : stepData.body;
    display.appendChild(b);
    spawnHearts();
}

function nextStep() {
    startAudio();
    currentStep++;
    if(currentStep < steps.length){
        showStep();
    } else {
        // Start slideshow po wszystkich krokach
        display.style.display="none";
        startSlideshow();
        document.querySelector(".arrow").style.display="none";
    }
}

// Slideshow
const totalImages=39;
let currentImage=1;
function startSlideshow(){
    const slideshow=document.getElementById("slideshow");
    slideshow.style.display="block";
    setInterval(()=>{
        slideshow.style.backgroundImage=`url('image${currentImage}.jpg')`;
        currentImage++;
        if(currentImage>totalImages) currentImage=1;
    },5000);
}

// start pierwszego kroku
showStep();
</script>

</body>
</html>
