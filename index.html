<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Dla Ciebie, Ola</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #0f0f0f;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* kontener */
.container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    max-width: 800px;
    z-index: 2;
}

/* tekst */
.text-title {
    color: #ff4d4d;
    font-size: 50px;
    margin-bottom: 10px;
}

.text-body {
    color: #f1f1f1;
    font-size: 28px;
    line-height: 1.5;
    white-space: pre-line;
}

/* animacje */
.section {
    opacity: 0;
    transform: scale(0.9);
    transition: 0.6s;
}
.section.show {
    opacity: 1;
    transform: scale(1);
}

/* strzałka */
.arrow {
    font-size: 48px;
    cursor: pointer;
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
}

/* serca */
.heart {
    position: absolute;
    font-size: 30px;
    animation: floatUp 2s ease-out forwards;
    pointer-events: none;
    z-index: 9999;
}
@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-250px); opacity: 0; }
}

/* slideshow */
#slideshow {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    background-size: cover;
    background-position: center;
    z-index: 1;
}
</style>
</head>

<body>

<div class="container" id="display"></div>
<div class="arrow" onclick="nextStep()">➡️</div>
<div id="slideshow"></div>

<audio id="audio" loop>
    <source src="muzyka.mp3.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");
let audioStarted = false;

function startAudio(){
    if(!audioStarted){
        audio.volume = 1;
        audio.play().catch(e => console.log("audio error:", e));
        audioStarted = true;
    }
}

// ❤️ serduszka
function spawnHearts() {
    for(let i=0;i<15;i++){
        const heart = document.createElement("div");
        heart.className="heart";
        heart.innerText="❤️";
        heart.style.left=Math.random()*100+"%";
        heart.style.top="100%";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),2000);
    }
}

// licznik
const startDate = new Date("2024-11-29");

function calculateTotal() {
    const now = new Date();
    const diff = now - startDate;
    const days = Math.floor(diff / (1000*60*60*24));
    const months = (days / 30.4375).toFixed(1);
    const years = (months / 12).toFixed(2);
    return {days, months, years};
}

// teksty
const steps = [
    {body: () => `Jesteśmy razem ${calculateTotal().years} lat`},
    {body: () => `Jesteśmy razem ${calculateTotal().months} miesięcy`},
    {body: () => `Jesteśmy razem ${calculateTotal().days} dni`},

    {title:"Pierwsza wiadomość 17.07.2024", body:"o treści '.'"},

    {title:"Wejście w związek 29.11.2024", body:"A więc Aleksandro. Jak ostatnio sprawdzaliśmy nasza znajomość zaczęła rozwijać się w lipcu kiedy byliśmy dla siebie zwykłymi nnkami chcącymi się po prostu poznać w kierunku koleżeńskim/przyjacielskim gdyż ani jedno ani drugie nie szukało wtedy miłości tym bardziej na Fivemie.\nZ biegiem czasu jedno i drugie zaczęło dostrzegać efekt zakochania i możliwego związku co przez dłuższy czas w sobie ukrywaliśmy.\nA po wczorajszej rozmowie niekoniecznie wiedziałem jakby Ci powiedzieć, że nie chce żebyś tylko w Fivemie, a również poza grą nazywać Ciebie swoją babą ponieważ po prostu Cię kocham."},

    {title:"Pierwsze spotkanie 21.06.2025", body:""},

    {body:"Wiem, że Cię skrzywdziłem."},
    {body:"Okłamywałem Cię.\nObiecywałem rzeczy, których nie zrobiłem."},
    {body:"A mimo to byłaś przy mnie."},
    {title:"Jesteś dla mnie naprawdę ważna.", body:"Najważniejszą osobą w moim życiu."},
    {body:"Chcę się zmienić działaniem."},
    {body:"Nie skreślaj mnie proszę."}
];

let i = 0;
const display = document.getElementById("display");

// pokaz tekstu (NOWA wersja)
function showStep(){
    display.innerHTML = "";

    const wrapper = document.createElement("div");

    if(steps[i].title){
        const t = document.createElement("div");
        t.className = "text-title section";
        t.innerText = steps[i].title;
        wrapper.appendChild(t);
        setTimeout(()=>t.classList.add("show"), 100);
    }

    const b = document.createElement("div");
    b.className = "text-body section";
    b.innerText = typeof steps[i].body === "function"
        ? steps[i].body()
        : steps[i].body;

    wrapper.appendChild(b);
    setTimeout(()=>b.classList.add("show"), 400);

    display.appendChild(wrapper);
}

// kliknięcie dalej
function nextStep(){
    startAudio();
    spawnHearts();

    const current = display.firstChild;
    if(current){
        current.classList.remove("show");
    }

    setTimeout(()=>{
        i++;
        if(i < steps.length){
            showStep();
        } else {
            startSlideshow();
            document.querySelector(".arrow").style.display = "none";
            display.style.display = "none";
        }
    }, 400);
}

// slideshow
function startSlideshow(){
    const slide = document.getElementById("slideshow");
    slide.style.display = "block";

    let img = 1;
    slide.style.backgroundImage = `url('image1.png')`;

    setInterval(() => {
        img++;
        if(img > 39) img = 1;
        slide.style.backgroundImage = `url('image${img}.png')`;
    }, 5000);
}

showStep();
</script>

</body>
</html>
